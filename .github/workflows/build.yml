name: Build macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install "PyQt6==6.4.2" "PyQt6-Qt6==6.4.2" "PyQt6-sip"
          pip install pynput --no-deps
          pip install pyinstaller

      - name: Construir .app con PyInstaller
        run: |
          pyinstaller pomodoro_pet.spec --noconfirm

      - name: Comprimir .app en ZIP
        run: |
          cd dist
          zip -r "../Pomodoro-Pet-macOS.zip" "Pomodoro Pet.app"

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Pomodoro Pet ${{ github.ref_name }}"
          body: |
            ## 🐾 Pomodoro Pet ${{ github.ref_name }}
            1. Descarga `Pomodoro-Pet-macOS.zip`
            2. Descomprime y arrastra `Pomodoro Pet.app` a Aplicaciones
            3. Clic derecho → Abrir
          files: Pomodoro-Pet-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
